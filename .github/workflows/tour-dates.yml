name: Sync Tour Dates

on:
  schedule:
    - cron: "0 12 * * 1"   # weekly on Mondays at 12:00 UTC (8am ET)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > /tmp/google_credentials.json

      - name: Run tour date sync
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/google_credentials.json
          OUTPUT_WEBSITE_URL: ${{ secrets.OUTPUT_WEBSITE_URL }}
          OUTPUT_WEBSITE_SECRET: ${{ secrets.OUTPUT_WEBSITE_SECRET }}
          # These secrets already existed in the repo but were never passed to the job, so
          # the weekly run silently degraded vs. a local run: without AIRTABLE_API_KEY it fell
          # back to the hardcoded BAND_NAMES roster (23 acts) and never saw acts added in
          # Airtable, and the SeatGeek / Back 2 Mac sources skipped themselves entirely.
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          BANDSINTOWN_APP_ID: ${{ secrets.BANDSINTOWN_APP_ID }}
          BACK_2_MAC_SHEETS_ID: ${{ secrets.BACK_2_MAC_SHEETS_ID }}
        run: python main.py

      # Re-check stored ticket links and repair dead ones (free, no-AI DuckDuckGo path).
      # Runs only if the sync above succeeded; propagates fixes to the Sheet, front-end,
      # and event posts. Keeping it a separate step isolates its cost and failures.
      - name: Verify ticket links
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/google_credentials.json
          OUTPUT_WEBSITE_URL: ${{ secrets.OUTPUT_WEBSITE_URL }}
          OUTPUT_WEBSITE_SECRET: ${{ secrets.OUTPUT_WEBSITE_SECRET }}
        run: python main.py --verify-links-local
